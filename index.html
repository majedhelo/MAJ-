<title>MAJED</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --primary:#1a73e8;
  --primary-light:#e8f0fe;
  --now-color:#0d9488;
  --now-bg:#f0fdfb;
  --now-border:#0d9488;
  --txt:#202124;
  --dim:#5f6368;
  --border:#e0e0e0;
  --bg:#f8f9fa;
  --white:#ffffff;
  --red:#d93025;
  --gold:#f29900;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:'Tajawal',sans-serif;}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

/* HEADER */
.hdr{
  padding:calc(10px + var(--safe-top)) 16px 10px;
  background:var(--white);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.hdr-date{font-size:.75rem;color:var(--dim);font-weight:500;margin-bottom:2px;}
.hdr-time{font-size:2rem;font-weight:700;color:var(--txt);line-height:1;letter-spacing:-1px;direction:ltr;display:inline-block;}
.hdr-ampm{font-size:.9rem;font-weight:500;color:var(--dim);margin-right:6px;}

/* DAY TABS */
.tabs{
  display:flex;gap:4px;padding:8px 12px;overflow-x:auto;scrollbar-width:none;
  background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0;
}
.tabs::-webkit-scrollbar{display:none;}
.tab{
  padding:6px 12px;border-radius:20px;font-family:'Tajawal',sans-serif;
  font-size:.78rem;font-weight:600;cursor:pointer;border:none;
  background:transparent;color:var(--dim);transition:all .15s;white-space:nowrap;flex-shrink:0;
}
.tab.active{background:var(--primary);color:#fff;}
.tab.today{color:var(--primary);font-weight:700;}
.tab.today.active{background:var(--primary);color:#fff;}

/* SCROLL */
.scroll{flex:1;overflow-y:auto;padding:12px 14px calc(80px + var(--safe-bot));}
.scroll::-webkit-scrollbar{width:3px;}
.scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* NOW BANNER */
.now-banner{
  background:var(--now-color);border-radius:12px;
  padding:14px 16px;margin-bottom:12px;color:#fff;
}
.now-banner-lbl{font-size:.65rem;font-weight:700;opacity:.8;letter-spacing:.8px;margin-bottom:4px;}
.now-banner-title{font-size:1.1rem;font-weight:700;margin-bottom:2px;}
.now-banner-time{font-size:.75rem;opacity:.85;direction:ltr;text-align:right;margin-bottom:10px;}
.now-progress{background:#ffffff33;border-radius:6px;height:5px;}
.now-progress-fill{background:#fff;border-radius:6px;height:100%;transition:width 1s;}
.now-rem{font-size:.7rem;opacity:.8;margin-top:5px;text-align:left;direction:ltr;}

/* TASK LIST */
.task-list{display:flex;flex-direction:column;gap:2px;}

.task{
  display:flex;align-items:stretch;
  border-radius:8px;overflow:hidden;
  background:var(--white);border:1px solid var(--border);
  transition:box-shadow .15s;
  position:relative;
}
.task:active{box-shadow:0 2px 8px #0002;}
.task.is-now{
  border-color:var(--now-border);
  background:var(--now-bg);
  box-shadow:0 2px 12px #0d948820;
}
.task.is-done{opacity:.45;}

.task-stripe{width:4px;flex-shrink:0;}

.task-body{flex:1;padding:10px 12px;min-width:0;}
.task-time{font-size:.68rem;color:var(--dim);font-weight:500;direction:ltr;text-align:left;margin-bottom:3px;}
.task-title{font-size:.92rem;font-weight:600;color:var(--txt);line-height:1.3;}
.task.is-now .task-title{color:var(--now-color);font-weight:700;}
.task.is-now .task-time{color:var(--now-color);}
.now-label{font-size:.62rem;font-weight:700;color:var(--now-color);margin-top:3px;}

.task-actions{
  display:flex;flex-direction:column;justify-content:center;
  gap:2px;padding:6px 8px;flex-shrink:0;border-right:1px solid var(--border);
}
.task-btn{
  width:30px;height:30px;border-radius:6px;border:none;background:transparent;
  color:var(--dim);font-size:.8rem;cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:background .15s;
}
.task-btn:active{background:var(--bg);}
.task-btn.alarm-set{color:var(--gold);}

/* SECTION LABEL */
.section-lbl{
  font-size:.7rem;font-weight:600;color:var(--dim);
  padding:8px 4px 4px;letter-spacing:.5px;
}

/* FAB */
.fab{
  position:fixed;bottom:calc(16px + var(--safe-bot));left:16px;
  width:48px;height:48px;border-radius:50%;
  background:var(--primary);border:none;color:#fff;
  font-size:1.4rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px #1a73e844;z-index:50;transition:transform .15s;
}
.fab:active{transform:scale(.92);}

/* MODAL */
.overlay{
  position:fixed;inset:0;background:#0005;z-index:200;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.overlay.show{opacity:1;pointer-events:all;}
.sheet{
  background:var(--white);border-radius:16px 16px 0 0;width:100%;max-width:520px;
  padding:16px 16px calc(16px + var(--safe-bot));
  transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);
  max-height:88vh;overflow-y:auto;
}
.overlay.show .sheet{transform:translateY(0);}
.sheet-handle{width:32px;height:3px;background:var(--border);border-radius:3px;margin:0 auto 14px;}
.sheet-title{font-size:.95rem;font-weight:700;color:var(--txt);margin-bottom:14px;}

.form-row{margin-bottom:12px;}
.form-label{font-size:.72rem;font-weight:600;color:var(--dim);margin-bottom:4px;display:block;}
.form-input{
  width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;
  padding:9px 12px;color:var(--txt);font-family:'Tajawal',sans-serif;font-size:.88rem;
  outline:none;transition:border-color .15s;
}
.form-input:focus{border-color:var(--primary);}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

.btn-row{display:flex;gap:8px;margin-top:14px;}
.btn{
  flex:1;padding:11px;border-radius:8px;font-family:'Tajawal',sans-serif;
  font-size:.85rem;font-weight:700;cursor:pointer;border:none;transition:all .15s;
}
.btn-primary{background:var(--primary);color:#fff;}
.btn-danger{background:#fce8e6;color:var(--red);}
.btn-cancel{background:var(--bg);color:var(--dim);border:1px solid var(--border);}

/* ALARM EXTRAS */
.alarm-presets{display:flex;gap:6px;flex-wrap:wrap;}
.preset-btn{
  padding:6px 11px;border-radius:8px;border:1px solid var(--border);
  font-size:.75rem;font-weight:600;cursor:pointer;color:var(--dim);background:var(--white);
  font-family:'Tajawal',sans-serif;transition:all .15s;
}
.preset-btn:active{background:var(--primary);color:#fff;border-color:var(--primary);}
.alarm-days{display:flex;gap:5px;flex-wrap:wrap;}
.alarm-day{
  padding:5px 9px;border-radius:8px;border:1px solid var(--border);
  font-size:.73rem;font-weight:600;cursor:pointer;color:var(--dim);background:var(--white);
  font-family:'Tajawal',sans-serif;transition:all .15s;
}
.alarm-day.active{background:var(--primary);border-color:var(--primary);color:#fff;}

/* NOW LINE */
.now-line{display:flex;align-items:center;gap:8px;margin:6px 0;}
.now-line-dot{width:8px;height:8px;border-radius:50%;background:var(--now-color);flex-shrink:0;}
.now-line::after{content:'';flex:1;height:1px;background:var(--now-color);opacity:.3;}
</style>
</head>
<body>
<div class="app">
  <header class="hdr">
    <div class="hdr-date" id="hdrDate">--</div>
    <span class="hdr-time" id="hdrTime">--:--</span>
    <span class="hdr-ampm" id="hdrAmpm"></span>
  </header>
  <div class="tabs" id="tabs"></div>
  <div class="scroll" id="scroll">
    <div id="nowBanner"></div>
    <div class="task-list" id="taskList"></div>
  </div>
</div>

<button class="fab" onclick="openSheet(null,selectedDay)">+</button>

<!-- EDIT SHEET -->
<div class="overlay" id="editOverlay" onclick="if(event.target===this)closeSheet()">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheetTitle">إضافة مهمة</div>
    <input type="hidden" id="editId">
    <input type="hidden" id="editDay">
    <div class="form-row">
      <label class="form-label">عنوان المهمة</label>
      <input class="form-input" id="fTitle" type="text" placeholder="مثال: اجتماع مع الفريق">
    </div>
    <div class="form-row form-row-2">
      <div><label class="form-label">من</label><input class="form-input" id="fStart" type="time"></div>
      <div><label class="form-label">إلى</label><input class="form-input" id="fEnd" type="time"></div>
    </div>
    <div class="form-row">
      <label class="form-label">اللون</label>
      <select class="form-input" id="fCat">
        <option value="prayer">ذهبي — صلاة وذكر</option>
        <option value="work">أزرق — عمل</option>
        <option value="health">أخضر — رياضة</option>
        <option value="english">بنفسجي — دراسة</option>
        <option value="family">برتقالي — عائلة</option>
        <option value="rest">رمادي — راحة</option>
      </select>
    </div>
    <div class="form-row">
      <label class="form-label">أي أيام؟</label>
      <select class="form-input" id="fDays">
        <option value="single">هذا اليوم فقط</option>
        <option value="workdays">أيام العمل (أحد–خميس)</option>
        <option value="all">كل الأسبوع</option>
      </select>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveBlock()">حفظ</button>
      <button class="btn btn-cancel" onclick="closeSheet()">إلغاء</button>
    </div>
    <div class="btn-row" id="deleteRow" style="display:none;margin-top:4px;">
      <button class="btn btn-danger" onclick="deleteBlock()">حذف المهمة</button>
    </div>
  </div>
</div>

<!-- ALARM SHEET -->
<div class="overlay" id="alarmOverlay" onclick="if(event.target===this)closeAlarm()">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="alarmTitle">ضبط تنبيه</div>
    <div class="form-row">
      <label class="form-label">وقت التنبيه</label>
      <input class="form-input" id="alarmTime" type="time">
    </div>
    <div class="form-row">
      <label class="form-label">قبل بداية المهمة بـ</label>
      <div class="alarm-presets">
        <button class="preset-btn" onclick="setOffset(0)">في وقتها</button>
        <button class="preset-btn" onclick="setOffset(5)">5 دقائق</button>
        <button class="preset-btn" onclick="setOffset(10)">10 دقائق</button>
        <button class="preset-btn" onclick="setOffset(15)">15 دقيقة</button>
        <button class="preset-btn" onclick="setOffset(30)">30 دقيقة</button>
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">الأيام</label>
      <div class="alarm-days" id="alarmDays">
        <button class="alarm-day" data-d="0">أحد</button>
        <button class="alarm-day" data-d="1">إثنين</button>
        <button class="alarm-day" data-d="2">ثلاثاء</button>
        <button class="alarm-day" data-d="3">أربعاء</button>
        <button class="alarm-day" data-d="4">خميس</button>
        <button class="alarm-day" data-d="5">جمعة</button>
        <button class="alarm-day" data-d="6">سبت</button>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveAlarm()">حفظ التنبيه</button>
      <button class="btn btn-cancel" onclick="closeAlarm()">إلغاء</button>
    </div>
    <div class="btn-row" id="alarmDelRow" style="display:none;margin-top:4px;">
      <button class="btn btn-danger" onclick="deleteAlarm()">إلغاء التنبيه</button>
    </div>
  </div>
</div>

const DAY_AR = ['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
const SKEY = 'majed_v3';
const AKEY = 'majed_alarms_v2';
let schedule = {}, alarms = {};
let selectedDay = new Date().getDay();
let editingId = null, alarmBlockId = null, alarmBlockStart = null;

function load() {
  try { schedule = JSON.parse(localStorage.getItem(SKEY)||'{}'); } catch(e) { schedule = {}; }
  for(let d=0;d<7;d++) if(!schedule[d]) schedule[d]=JSON.parse(JSON.stringify(DEFAULTS[d]));
  try { alarms = JSON.parse(localStorage.getItem(AKEY)||'{}'); } catch(e) { alarms = {}; }
}
function saveS() { localStorage.setItem(SKEY,JSON.stringify(schedule)); }
function saveA() { localStorage.setItem(AKEY,JSON.stringify(alarms)); }

function toMins(t) { if(!t)return 0; const [h,m]=t.split(':').map(Number); return h*60+m; }
function nowMins() { const n=new Date(); return n.getHours()*60+n.getMinutes(); }
function fmtT(t) {
  const [h,m]=t.split(':').map(Number);
  return `${h%12||12}:${String(m).padStart(2,'0')} ${h>=12?'م':'ص'}`;
}
function genId() { return 'b'+Date.now()+Math.random().toString(36).slice(2,5); }
function sorted(d) { return (schedule[d]||[]).slice().sort((a,b)=>toMins(a.start)-toMins(b.start)); }

// ── CLOCK ─────────────────────────────────────────────────────────────────────
function updateClock() {
  const n = new Date();
  const h = n.getHours(), m = n.getMinutes();
  const h12 = h%12||12;
  const ap = h>=12?'م':'ص';
  document.getElementById('hdrTime').textContent = `${h12}:${String(m).padStart(2,'0')}`;
  document.getElementById('hdrAmpm').textContent = ap;
  document.getElementById('hdrDate').textContent =
    n.toLocaleDateString('ar-JO',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderTabs() {
  const today = new Date().getDay();
  const el = document.getElementById('tabs');
  el.innerHTML = '';
  DAY_AR.forEach((name,i) => {
    const b = document.createElement('button');
    b.className = 'tab'+(i===selectedDay?' active':'')+(i===today?' today':'');
    b.textContent = i===today ? name+' ●' : name;
    b.onclick = ()=>{ selectedDay=i; render(); };
    el.appendChild(b);
  });
}

function renderBanner() {
  const today = new Date().getDay();
  const el = document.getElementById('nowBanner');
  if(selectedDay!==today){ el.innerHTML=''; return; }
  const now = nowMins();
  const blocks = sorted(today);
  const cur = blocks.find(b=>{
    const e = toMins(b.end==='23:59'?'24:00':b.end);
    return now>=toMins(b.start) && now<e;
  });
  if(!cur){ el.innerHTML=''; return; }
  const s=toMins(cur.start), e=toMins(cur.end==='23:59'?'24:00':cur.end);
  const pct=Math.min(100,Math.round(((now-s)/(e-s))*100));
  const rem=e-now; const rh=Math.floor(rem/60),rm=rem%60;
  const remStr=rh>0?`${rh}س ${rm}د`:`${rm} دقيقة`;
  el.innerHTML=`<div class="now-banner">
    <div class="now-banner-lbl">● الآن</div>
    <div class="now-banner-title">${cur.title}</div>
    <div class="now-banner-time">${fmtT(cur.start)} – ${fmtT(cur.end)}</div>
    <div class="now-progress"><div class="now-progress-fill" style="width:${pct}%"></div></div>
    <div class="now-rem">متبقي ${remStr}</div>
  </div>`;
}

function renderTasks() {
  const today = new Date().getDay();
  const now = nowMins();
  const isToday = selectedDay===today;
  const blocks = sorted(selectedDay);
  const el = document.getElementById('taskList');
  el.innerHTML='';

  if(!blocks.length) {
    el.innerHTML='<div style="text-align:center;padding:40px 20px;color:#9aa0a6;font-size:.9rem;">لا توجد مهام · اضغط + لإضافة مهمة</div>';
    return;
  }

  let pastDone=false, nowInserted=false;

  blocks.forEach(b=>{
    const s=toMins(b.start);
    const e=toMins(b.end==='23:59'?'24:00':b.end);
    const isNow=isToday&&now>=s&&now<e;
    const isDone=isToday&&now>=e;
    const color=CAT_COLOR[b.cat]||'#9aa0a6';
    const hasAlarm=alarms[b.id];

    if(isToday&&!nowInserted&&s>now){
      const line=document.createElement('div');
      line.className='now-line';
      line.innerHTML='<div class="now-line-dot"></div>';
      el.appendChild(line);
      nowInserted=true;
    }

    const wrap=document.createElement('div');
    wrap.className='task'+(isNow?' is-now':'')+(isDone?' is-done':'');
    wrap.innerHTML=`
      <div class="task-stripe" style="background:${color};"></div>
      <div class="task-body">
        <div class="task-time">${fmtT(b.start)} – ${fmtT(b.end)}${hasAlarm?' · 🔔 '+fmtT(hasAlarm.time):''}</div>
        <div class="task-title">${b.title}</div>
        ${isNow?'<div class="now-label">● جارٍ الآن</div>':''}
      </div>
      <div class="task-actions">
        <button class="task-btn" onclick="openSheet('${b.id}',${selectedDay})" title="تعديل">✏️</button>
        <button class="task-btn${hasAlarm?' alarm-set':''}" onclick="openAlarm('${b.id}','${b.title}','${b.start}')" title="تنبيه">🔔</button>
      </div>`;
    el.appendChild(wrap);
  });
}

function render() {
  renderTabs();
  renderBanner();
  renderTasks();
}

// ── EDIT SHEET ────────────────────────────────────────────────────────────────
function openSheet(id,day) {
  editingId=id;
  document.getElementById('editDay').value=day;
  if(id) {
    const b=schedule[day].find(x=>x.id===id);
    if(!b)return;
    document.getElementById('sheetTitle').textContent='تعديل المهمة';
    document.getElementById('fTitle').value=b.title;
    document.getElementById('fStart').value=b.start;
    document.getElementById('fEnd').value=b.end==='23:59'?'23:59':b.end;
    document.getElementById('fCat').value=b.cat;
    document.getElementById('fDays').value='single';
    document.getElementById('deleteRow').style.display='flex';
  } else {
    document.getElementById('sheetTitle').textContent='إضافة مهمة';
    document.getElementById('fTitle').value='';
    document.getElementById('fStart').value='09:00';
    document.getElementById('fEnd').value='10:00';
    document.getElementById('fCat').value='rest';
    document.getElementById('fDays').value='single';
    document.getElementById('deleteRow').style.display='none';
  }
  document.getElementById('editOverlay').classList.add('show');
  setTimeout(()=>document.getElementById('fTitle').focus(),300);
}
function closeSheet() { document.getElementById('editOverlay').classList.remove('show'); }

function saveBlock() {
  const title=document.getElementById('fTitle').value.trim();
  if(!title){ document.getElementById('fTitle').focus();return; }
  const day=parseInt(document.getElementById('editDay').value);
  const start=document.getElementById('fStart').value;
  const end=document.getElementById('fEnd').value;
  const cat=document.getElementById('fCat').value;
  const daysMode=document.getElementById('fDays').value;
  let targets=[day];
  if(daysMode==='workdays') targets=[0,1,2,3,4];
  if(daysMode==='all') targets=[0,1,2,3,4,5,6];
  if(editingId&&daysMode==='single') {
    const idx=schedule[day].findIndex(x=>x.id===editingId);
    if(idx>=0) schedule[day][idx]={...schedule[day][idx],title,start,end,cat};
  } else {
    targets.forEach(d=>{
      if(!schedule[d])schedule[d]=[];
      schedule[d].push({id:genId(),title,start,end,cat});
    });
  }
  saveS(); closeSheet(); render();
}
function deleteBlock() {
  const day=parseInt(document.getElementById('editDay').value);
  schedule[day]=schedule[day].filter(x=>x.id!==editingId);
  saveS(); closeSheet(); render();
}

// ── ALARM SHEET ───────────────────────────────────────────────────────────────
function openAlarm(id,title,start) {
  alarmBlockId=id; alarmBlockStart=start;
  document.getElementById('alarmTitle').textContent='تنبيه: '+title;
  document.getElementById('alarmTime').value=start;
  document.querySelectorAll('.alarm-day').forEach(b=>b.classList.remove('active'));
  const ex=alarms[id];
  if(ex) {
    document.getElementById('alarmTime').value=ex.time;
    document.getElementById('alarmDelRow').style.display='flex';
    ex.days.forEach(d=>{
      const btn=document.querySelector(`.alarm-day[data-d="${d}"]`);
      if(btn)btn.classList.add('active');
    });
  } else {
    document.getElementById('alarmDelRow').style.display='none';
    const btn=document.querySelector(`.alarm-day[data-d="${selectedDay}"]`);
    if(btn)btn.classList.add('active');
  }
  document.getElementById('alarmOverlay').classList.add('show');
}
function closeAlarm() { document.getElementById('alarmOverlay').classList.remove('show'); }
function setOffset(mins) {
  const [h,m]=alarmBlockStart.split(':').map(Number);
  let t=h*60+m-mins; if(t<0)t+=1440;
  document.getElementById('alarmTime').value=
    String(Math.floor(t/60)%24).padStart(2,'0')+':'+String(t%60).padStart(2,'0');
}
document.addEventListener('click',e=>{
  if(e.target.classList.contains('alarm-day')) e.target.classList.toggle('active');
});
function saveAlarm() {
  const time=document.getElementById('alarmTime').value;
  const days=[...document.querySelectorAll('.alarm-day.active')].map(b=>parseInt(b.dataset.d));
  if(!days.length){ alert('اختر يوماً واحداً على الأقل'); return; }
  alarms[alarmBlockId]={time,days};
  saveA(); closeAlarm(); render();
  const [h,m]=time.split(':').map(Number);
  alert(`✅ تم ضبط التنبيه على ${h%12||12}:${String(m).padStart(2,'0')} ${h>=12?'م':'ص'}`);
  scheduleAlarms();
}
function deleteAlarm() {
  delete alarms[alarmBlockId];
  saveA(); closeAlarm(); render();
}

// ── NOTIFICATIONS ─────────────────────────────────────────────────────────────
function scheduleAlarms() {
  if(!('Notification' in window)||Notification.permission!=='granted') return;
  const today=new Date().getDay();
  Object.entries(alarms).forEach(([id,al])=>{
    if(!al.days.includes(today))return;
    const [h,m]=al.time.split(':').map(Number);
    const t=new Date(); t.setHours(h,m,0,0);
    const diff=t.getTime()-Date.now();
    if(diff>0&&diff<86400000) {
      let title='تذكير';
      for(let d=0;d<7;d++){const b=(schedule[d]||[]).find(x=>x.id===id);if(b){title=b.title;break;}}
      setTimeout(()=>new Notification('🔔 '+title,{body:'حان وقت '+title}),diff);
    }
  });
}

if('Notification' in window && Notification.permission==='granted') scheduleAlarms();

// ── INIT ──────────────────────────────────────────────────────────────────────
load(); render(); updateClock();
setInterval(updateClock,1000);
setInterval(()=>{ if(selectedDay===new Date().getDay()) render(); },30000);
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeSheet();closeAlarm();}
});
</script>
