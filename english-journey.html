<html lang="ar" dir="rtl">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="apple-mobile-web-app-capable" content="yes">

<link rel="apple-touch-icon" href="ej-icon-192.png">

<style>
  :root{
    --bg:#F5F3EC;
    --card:#FFFFFF;
    --teal:#0E6B5C;
    --teal-dark:#0A4F44;
    --teal-light:#DCEFEA;
    --amber:#E8A33D;
    --amber-light:#FBEBD1;
    --coral:#E8604F;
    --ink:#1F2A24;
    --ink-soft:#5B6B63;
    --border:#E4DFD1;
    --a2:#4C9E8E;
    --b1:#E8A33D;
    --b2:#E8604F;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:'Tajawal',sans-serif;
    min-height:100vh;
  }
  h1,h2,h3,.display{font-family:'Cairo',sans-serif;}
  .app{max-width:720px;margin:0 auto;padding-bottom:90px;}
  header.hero{
    background:linear-gradient(135deg,var(--teal) 0%, var(--teal-dark) 100%);
    color:#fff; padding:22px 18px 26px; border-radius:0 0 28px 28px;
    position:relative; overflow:hidden;
  }
  header.hero::after{
    content:""; position:absolute; inset:0;
    background:radial-gradient(circle at 85% -10%, rgba(232,163,61,0.35), transparent 55%);
  }
  .hero-top{display:flex; justify-content:space-between; align-items:flex-start; position:relative; z-index:1;}
  .hero-title{font-size:22px; font-weight:800; margin:0;}
  .hero-sub{font-size:13px; opacity:0.85; margin-top:4px;}
  .streak-pill{
    background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3);
    border-radius:999px; padding:6px 14px; font-size:13px; font-weight:700;
    display:flex; align-items:center; gap:6px; white-space:nowrap;
  }
  .path{display:flex; align-items:center; gap:4px; margin-top:20px; position:relative; z-index:1; overflow-x:auto; padding-bottom:4px;}
  .path::-webkit-scrollbar{display:none;}
  .path-step{
    flex:0 0 auto; display:flex; flex-direction:column; align-items:center; gap:6px; min-width:52px;
  }
  .path-dot{
    width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:800; border:2px solid rgba(255,255,255,0.4); color:#fff;
    background:rgba(255,255,255,0.08);
  }
  .path-dot.done{background:var(--amber); border-color:var(--amber); color:var(--teal-dark);}
  .path-dot.current{background:#fff; color:var(--teal-dark); border-color:#fff; box-shadow:0 0 0 4px rgba(232,163,61,0.45);}
  .path-line{flex:1; height:2px; background:rgba(255,255,255,0.25); min-width:14px;}
  .path-label{font-size:10px; opacity:0.85;}

  .tabs{display:flex; gap:8px; padding:14px 18px 0;}
  .tab{
    flex:1; text-align:center; padding:10px 6px; border-radius:14px; font-size:13px; font-weight:700;
    background:var(--card); border:1px solid var(--border); color:var(--ink-soft); cursor:pointer;
  }
  .tab.active{background:var(--teal); color:#fff; border-color:var(--teal);}

  .section{padding:16px 18px;}
  .card{
    background:var(--card); border:1px solid var(--border); border-radius:18px; padding:16px;
    margin-bottom:14px; box-shadow:0 2px 10px rgba(31,42,36,0.04);
  }
  .card h3{margin:0 0 8px; font-size:16px;}
  .muted{color:var(--ink-soft); font-size:13px;}

  .quote-card{
    background:linear-gradient(135deg,var(--amber-light),#fff);
    border:1px solid var(--amber); border-radius:18px; padding:16px; margin-bottom:14px;
  }
  .quote-card .q-text{font-weight:700; font-size:15px; line-height:1.8;}
  .quote-card .q-src{font-size:12px; color:var(--ink-soft); margin-top:6px;}

  .today-card{border:2px solid var(--teal); position:relative;}
  .badge{
    display:inline-block; font-size:11px; font-weight:800; padding:4px 10px; border-radius:999px;
    background:var(--teal-light); color:var(--teal-dark); margin-bottom:8px;
  }
  .badge.b1{background:#FBEBD1; color:#8A5A16;}
  .badge.b2{background:#FBDCD6; color:#A33322;}
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    background:var(--teal); color:#fff; border:none; border-radius:12px;
    padding:12px 18px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit;
    width:100%;
  }
  .btn.secondary{background:transparent; color:var(--teal); border:2px solid var(--teal);}
  .btn.small{width:auto; padding:8px 14px; font-size:13px;}
  .btn.amber{background:var(--coral);}
  .btn:disabled{opacity:0.5; cursor:not-allowed;}

  .vocab-review-item{
    display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border);
  }
  .vocab-review-item:last-child{border-bottom:none;}
  .vocab-word{font-weight:700;}
  .vocab-word .ar{color:var(--ink-soft); font-size:12px; font-weight:400; margin-right:6px;}

  .lesson-row{
    display:flex; align-items:center; gap:12px; padding:12px; border-radius:14px; margin-bottom:8px;
    background:var(--card); border:1px solid var(--border); cursor:pointer;
  }
  .lesson-row.locked{opacity:0.55; cursor:default;}
  .lesson-row.done{border-color:var(--teal);}
  .lesson-num{
    width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:13px; background:var(--teal-light); color:var(--teal-dark); flex:0 0 auto;
  }
  .lesson-row.done .lesson-num{background:var(--teal); color:#fff;}
  .lesson-info{flex:1;}
  .lesson-tag{font-size:11px; font-weight:800; color:var(--ink-soft);}
  .lesson-title{font-size:14px; font-weight:700;}
  .lesson-date{font-size:11px; color:var(--ink-soft);}

  .lesson-detail-section{margin-bottom:16px;}
  .lesson-detail-section h3{
    display:flex; align-items:center; gap:8px; font-size:15px; margin-bottom:10px;
    color:var(--teal-dark);
  }
  .icon-circle{
    width:28px; height:28px; border-radius:50%; background:var(--teal-light); display:flex;
    align-items:center; justify-content:center; font-size:14px; flex:0 0 auto;
  }
  a.link-btn{
    display:block; background:var(--teal-light); color:var(--teal-dark); text-decoration:none;
    padding:12px 14px; border-radius:12px; font-weight:700; font-size:13px; margin-bottom:8px;
  }
  ol.qa-list{padding-right:20px; margin:0; font-size:14px; line-height:2;}
  .eng-text{
    font-family:'Tajawal',sans-serif; direction:ltr; text-align:left; font-size:14.5px; line-height:1.9;
    background:#FAFAF7; border:1px solid var(--border); border-radius:12px; padding:14px; color:var(--ink);
  }
  .vocab-grid{display:flex; flex-direction:column; gap:8px;}
  .vocab-item{
    display:flex; justify-content:space-between; align-items:center; background:#FAFAF7;
    border:1px solid var(--border); border-radius:12px; padding:10px 12px;
  }
  .vocab-item .en{font-weight:800; direction:ltr;}
  .vocab-item .meta{font-size:12px; color:var(--ink-soft); text-align:left;}
  .grammar-ex{background:var(--teal-light); border-radius:12px; padding:10px 12px; font-size:13px; direction:ltr; text-align:left; margin:4px 0;}
  .practice-item{font-size:13.5px; margin:6px 0; padding-right:6px;}
  .prompt-box{background:#FAFAF7; border:1px dashed var(--border); border-radius:12px; padding:12px; font-size:14px;}
  .meta-row{display:flex; gap:8px; margin-top:8px; flex-wrap:wrap;}
  .meta-chip{background:var(--teal-light); color:var(--teal-dark); font-size:11px; font-weight:700; padding:4px 10px; border-radius:999px;}

  textarea#importArea{
    width:100%; min-height:160px; border:1px solid var(--border); border-radius:12px; padding:12px;
    font-family:monospace; font-size:12px; direction:ltr; text-align:left;
  }
  .toast{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff;
    padding:10px 20px; border-radius:999px; font-size:13px; z-index:50; opacity:0; transition:opacity .3s;
    pointer-events:none;
  }
  .toast.show{opacity:1;}
  .empty-state{text-align:center; padding:30px 10px; color:var(--ink-soft);}
  .roadmap-table{width:100%; border-collapse:collapse; font-size:12.5px;}
  .roadmap-table th, .roadmap-table td{border-bottom:1px solid var(--border); padding:8px 4px; text-align:right;}
  .roadmap-table th{color:var(--ink-soft); font-weight:700;}
  .back-btn{background:none; border:none; color:var(--teal-dark); font-weight:700; font-size:14px; padding:0; margin-bottom:10px; cursor:pointer; display:flex; align-items:center; gap:4px;}
  .schema-box{background:#1F2A24; color:#DCEFEA; border-radius:12px; padding:12px; font-family:monospace; font-size:11px; direction:ltr; text-align:left; overflow-x:auto; white-space:pre;}
</style>
</head>

<div id="root"></div>

<script>
// ---------------- CONFIG ----------------
const COURSE_START = "2026-07-11"; // Saturday
const COURSE_END = "2027-02-05"; // Friday (graduation day, not a study day)

const LEVEL_META = {
  5:{cefr:"A2"}, 6:{cefr:"A2"},
  7:{cefr:"B1"}, 8:{cefr:"B1"}, 9:{cefr:"B1"}, 10:{cefr:"B1"},
  11:{cefr:"B2"}, 12:{cefr:"B2"}
};

const ROADMAP_OVERVIEW = [
  {cefr:"A2", level:5, range:"دروس 1 - 12", period:"11 - 23 يوليو 2026", focus:"روتين، تعارف، وصف المكان"},
  {cefr:"A2", level:6, range:"دروس 13 - 24", period:"25 يوليو - 6 أغسطس 2026", focus:"مضارع مستمر، ماضي بسيط، قدرات"},
  {cefr:"B1", level:7, range:"دروس 25 - 48", period:"7 أغسطس - 8 سبتمبر 2026", focus:"مقارنات، تجارب سابقة (Present Perfect)"},
  {cefr:"B1", level:8, range:"دروس 49 - 72", period:"9 سبتمبر - 10 أكتوبر 2026", focus:"مستقبل، شرط (Conditionals 1)، أفعال معيارية"},
  {cefr:"B1", level:9, range:"دروس 73 - 96", period:"11 أكتوبر - 8 نوفمبر 2026", focus:"مبني للمجهول، كلام منقول أساسي"},
  {cefr:"B1", level:10, range:"دروس 97 - 120", period:"9 نوفمبر - 7 ديسمبر 2026", focus:"توسّع مفردات B1، نقاشات رأي"},
  {cefr:"B2", level:11, range:"دروس 121 - 150", period:"8 ديسمبر 2026 - 14 يناير 2027", focus:"شرط متقدم، كلام منقول، عبارات ربط"},
  {cefr:"B2", level:12, range:"دروس 151 - 180", period:"15 يناير - 4 فبراير 2027", focus:"إتقان B2: نقاش، تحليل، كتابة رسمية"},
];

// ---------------- SEED LESSON DATA (Week 1) ----------------
const SEED_LESSONS = [
{
  id:1, cefr:"A2", level:5, title:"Daily Routines",
  quote:{text:"وَأَن لَّيْسَ لِلْإِنسَانِ إِلَّا مَا سَعَىٰ", source:"سورة النجم - آية 39"},
  listening:{source:"British Council – LearnEnglish Podcasts (Series 1)", url:"https://learnenglish.britishcouncil.org/general-english/audio-series/podcasts",
    instructions:"استمع للحلقة الأولى من Series 1 (مستوى A2/B1). استمع مرة بدون النص، ثم افتح الـ Transcript واستمع مرة ثانية وأنت تقرأ معه، ثم اعمل Shadowing لجملتين تتحدث فيهما Tess عن يومها المعتاد."},
  reading:{text:"Layla is a nurse. She works in a busy hospital in Amman. Every day, she wakes up at six o'clock. First, she prays and drinks a cup of coffee. Then, she checks her schedule on her phone. Layla usually starts her shift at eight o'clock. During the day, she takes care of patients and works with a friendly team. She doesn't stop for a long lunch; she just eats a quick sandwich. In the evening, Layla comes home tired but happy. She studies English for two hours because she wants to move to the United States. She believes that small steps every day lead to big results. Before she sleeps, she writes three things she is grateful for. Layla's routine is simple, but it helps her stay focused on her goal.",
    questions:[
      "What is Layla's job? (سؤال تفاصيل)",
      "What is the first thing she does in the morning? (سؤال تفاصيل)",
      "Why does she study English every day? (سؤال استنتاج)",
      "اختر المرادف الأقرب لكلمة 'focused': (a) confused (b) concentrated (c) tired",
      "في جملة 'she writes three things she is grateful for'، على من تعود 'she'؟",
      "ما الفكرة العامة للنص؟",
      "صح أم خطأ: تتوقف ليلى لتناول غداء طويل كل يوم."
    ]},
  vocabulary:[
    {word:"routine", arabic:"روتين / عادة يومية", synonym:"habit"},
    {word:"schedule", arabic:"جدول مواعيد", synonym:"timetable"},
    {word:"exhausted", arabic:"منهك", synonym:"tired"},
    {word:"achieve", arabic:"يحقق", synonym:"accomplish"},
    {word:"focused", arabic:"مركّز", synonym:"concentrated"},
    {word:"grateful", arabic:"ممتنّ", synonym:"thankful"}
  ],
  grammar:{title:"Present Simple – المضارع البسيط للعادات والروتين",
    explanation:"يُستخدم المضارع البسيط للحديث عن العادات، الروتين اليومي، والحقائق الثابتة. التركيب: مع (I/You/We/They) نستخدم الفعل كما هو، ومع (He/She/It) نضيف s أو es للفعل. للنفي نستخدم (don't / doesn't). كلمات دلالية تساعدك على التعرف عليه: usually, every day, always, often, never.",
    examples:["She works in a hospital.","They study every evening.","He doesn't stop for lunch.","I usually wake up early."],
    practice:["I ______ (go) to work at 7 AM.","She ______ (not / eat) breakfast at home.","They ______ (study) English every night.","He ______ (wake up) at six o'clock.","We ______ (not / have) a long break."]
  },
  writing:{prompt:"اكتب فقرة من 60-80 كلمة عن روتينك اليومي باستخدام المضارع البسيط. استخدم كلمتين على الأقل من كلمات هذا الدرس.", wordCount:"60-80 كلمة"},
  speaking:{prompt:"قدّم نفسك لشخص تقابله لأول مرة: اسمك، عملك، وروتينك اليومي (Self-introduction). استخدم أداة ذكاء اصطناعي للمحادثة الصوتية واطلب منها تقييم نطقك وتصحيح أخطائك القواعدية.", duration:"2-3 دقائق", mode:"Monologue / تعارف"}
},
{
  id:2, cefr:"A2", level:5, title:"Introducing Yourself & Family",
  quote:{text:"خيركم خيركم لأهله", source:"حديث شريف - رواه الترمذي"},
  listening:{source:"British Council – LearnEnglish Teens (A2 Listening)", url:"https://learnenglishteens.britishcouncil.org/skills/listening/a2-listening",
    instructions:"اختر أي نشاط استماع بسيط من هذه الصفحة يتضمن حوار تعارف أو حديث عائلي/شخصي. استمع مرتين، ثم افتح النص المكتوب (Transcript إن توفر) وحاول تكرار جملة التعارف بنفس نبرة المتحدث."},
  reading:{text:"My name is Omar. I am twenty-eight years old, and I am from Amman, Jordan. I am a hard-working and patient person. My family is not very big. My father is a teacher, and he is very wise. My mother is a housewife, and she is always kind to everyone. I have one sister; her name is Rana. She is younger than me, and she is a university student. We are close, and we talk every day. On weekends, my family is usually together at home. My grandmother is elderly, but she is still active and funny. I am proud of my family because they are supportive. In the future, I hope my family will be proud of me too.",
    questions:[
      "What is Omar's father's job?",
      "How does the writer describe his mother?",
      "Who is younger, Omar or Rana?",
      "What does 'supportive' mean in this text?",
      "In 'they are supportive', who does 'they' refer to?",
      "What is the general idea of this text?",
      "صح أم خطأ: الجدة غير نشيطة إطلاقاً."
    ]},
  vocabulary:[
    {word:"hard-working", arabic:"مجتهد", synonym:"diligent"},
    {word:"patient", arabic:"صبور", synonym:"tolerant"},
    {word:"wise", arabic:"حكيم", synonym:"sensible"},
    {word:"supportive", arabic:"داعم", synonym:"encouraging"},
    {word:"elderly", arabic:"مسنّ", synonym:"aged"},
    {word:"proud", arabic:"فخور", synonym:"pleased"}
  ],
  grammar:{title:"To Be (am/is/are) + Adjectives – وصف الأشخاص",
    explanation:"نستخدم فعل الكينونة (am/is/are) مباشرة مع الصفة لوصف شخص أو شيء، بدون فعل آخر بعده. التركيب: Subject + am/is/are (+not) + adjective. مثال النفي: isn't / aren't.",
    examples:["I am proud of my family.","She is kind to everyone.","They are supportive.","He isn't lazy; he is hard-working."],
    practice:["She ______ (be) very wise.","We ______ (be not) far from our goal.","My sister ______ (be) a student.","They ______ (be) close to each other.","I ______ (be) proud of my progress."]
  },
  writing:{prompt:"اكتب 60-80 كلمة تصف فيها أحد أفراد عائلتك باستخدام (To be + صفة). حاول استخدام ثلاث صفات مختلفة على الأقل.", wordCount:"60-80 كلمة"},
  speaking:{prompt:"تخيّل أنك تقابل زميلاً جديداً في العمل لأول مرة، وتحدثه عن نفسك وعائلتك. اطلب من أداة الذكاء الاصطناعي أن تلعب دور هذا الزميل (Role play) وتسألك أسئلة متابعة.", duration:"2-3 دقائق", mode:"Role play"}
},
{
  id:3, cefr:"A2", level:5, title:"Describing Your Home",
  quote:{text:"البيت الذي فيه ذكر الله كالبيت الحيّ", source:"حديث شريف - معنى عام، رواه البخاري ومسلم بمعناه"},
  listening:{source:"British Council – LearnEnglish (A2 Listening)", url:"https://learnenglish.britishcouncil.org/free-resources/listening/a2",
    instructions:"اختر أحد التمارين المتعلقة بالرسائل أو الاتجاهات (phone messages / directions) من هذه الصفحة. قبل الاستماع اقرأ مهمة التحضير (Preparation task)، ثم استمع مرتين وحاول تحديد أماكن الأشياء المذكورة."},
  reading:{text:"I live in a small apartment in the third floor of a building near the city center. My apartment is cozy, but it isn't very spacious. There is a bedroom, a kitchen, and a small living room. My desk is next to the window, so I can see the street while I study. There is a bookshelf between the desk and the door. The kitchen is small, but it is convenient because everything is close to my hand. Sometimes the street is noisy in the morning, but at night it becomes peaceful. I don't have a garden, but there is a nearby park where I walk every evening. My apartment is simple, but I feel comfortable and safe there.",
    questions:[
      "Where is the writer's apartment located?",
      "What is next to the window?",
      "Why is the kitchen convenient?",
      "What does 'peaceful' mean here?",
      "In 'there is a nearby park where I walk', what does 'where' refer to?",
      "What is the general idea of the text?",
      "صح أم خطأ: الشارع صاخب طوال اليوم."
    ]},
  vocabulary:[
    {word:"cozy", arabic:"دافئ ومريح", synonym:"comfortable"},
    {word:"spacious", arabic:"واسع", synonym:"roomy"},
    {word:"noisy", arabic:"صاخب", synonym:"loud"},
    {word:"peaceful", arabic:"هادئ", synonym:"calm"},
    {word:"nearby", arabic:"قريب", synonym:"close"},
    {word:"convenient", arabic:"مناسب وعملي", synonym:"suitable"}
  ],
  grammar:{title:"There is / There are + حروف الجر المكانية",
    explanation:"نستخدم There is مع الاسم المفرد وThere are مع الجمع للحديث عن وجود شيء ما. نستخدم حروف الجر المكانية (in, on, under, next to, between, behind, in front of) لتوضيح مكان الشيء بدقة.",
    examples:["There is a bookshelf between the desk and the door.","There are two bedrooms in my apartment.","The park is next to my building.","My desk is in front of the window."],
    practice:["______ a small kitchen in my apartment.","______ two chairs next to the table.","The lamp is ______ (on/under) the desk.","My house is ______ (next to/between) the mosque and the school.","______ a park near my building."]
  },
  writing:{prompt:"اكتب 70-90 كلمة تصف فيها منزلك أو غرفتك باستخدام There is/are وحروف الجر المكانية.", wordCount:"70-90 كلمة"},
  speaking:{prompt:"صف منزلك أو غرفتك بالتفصيل كأنك تصف المكان لصديق سيزورك لأول مرة، واذكر أين توجد الأشياء الرئيسية.", duration:"2-3 دقائق", mode:"Monologue / وصف مكان"}
},

// ---------------- STATE ----------------
let state = {
  lessons: [],
  progress: {completedIds:[], streak:0, lastCompletedDate:null},
  vocabBank: {},
  view: "home", // home | roadmap | lesson | import
  activeLessonId: null
};

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

// ---------------- DATE HELPERS ----------------
function parseDate(str){ const [y,m,d]=str.split('-').map(Number); return new Date(y, m-1, d); }
function fmt(date){ const y=date.getFullYear(); const m=String(date.getMonth()+1).padStart(2,'0'); const d=String(date.getDate()).padStart(2,'0'); return `${y}-${m}-${d}`; }
function isFriday(date){ return date.getDay()===5; }
function addDays(date, n){ const d=new Date(date); d.setDate(d.getDate()+n); return d; }

// map lesson index (1-based) -> calendar date, skipping Fridays
function dateForLessonIndex(n){
  let d = parseDate(COURSE_START);
  let count = 0;
  while(true){
    if(!isFriday(d)){
      count++;
      if(count===n) return new Date(d);
    }
    d = addDays(d,1);
  }
}
// map today's date -> study-day index (or null if Friday/before start)
function studyIndexForToday(){
  const today = new Date(); today.setHours(0,0,0,0);
  const start = parseDate(COURSE_START);
  if(today < start) return 0;
  if(isFriday(today)) return -1; // rest day
  let d = new Date(start); let count=0;
  while(fmt(d) !== fmt(today)){
    if(!isFriday(d)) count++;
    d = addDays(d,1);
    if(d > addDays(today, 5)) break; // safety
  }
  if(!isFriday(d)) count++;
  return count;
}

const WEEKDAY_AR = ["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
function fmtArDate(date){
  return `${WEEKDAY_AR[date.getDay()]} ${date.getDate()}/${date.getMonth()+1}/${date.getFullYear()}`;
}

// ---------------- STORAGE (with safe fallback) ----------------
// window.storage only exists when this file is opened from inside a Claude
// conversation. If opened as a standalone downloaded file, it is undefined,
// so we fall back to an in-memory store (works for the session, but won't
// persist after closing the page) instead of crashing.
let usingRealStorage = false;
let usingLocalStorage = false;
let memoryStore = {};

async function safeGet(key){
  try{
    if(window.storage && typeof window.storage.get === 'function'){
      const r = await window.storage.get(key);
      usingRealStorage = true;
      return r;
    }
  }catch(e){ /* fall through */ }
  try{
    const v = window.localStorage.getItem('ej_'+key);
    if(v !== null){ usingLocalStorage = true; return {key, value: v}; }
  }catch(e){ /* fall through to memory */ }
  return memoryStore[key] ? {key, value: memoryStore[key]} : null;
}
async function safeSet(key, value){
  try{
    if(window.storage && typeof window.storage.set === 'function'){
      const r = await window.storage.set(key, value, false);
      usingRealStorage = true;
      return r;
    }
  }catch(e){ /* fall through */ }
  try{
    window.localStorage.setItem('ej_'+key, value);
    usingLocalStorage = true;
    return {key, value};
  }catch(e){ /* fall through to memory */ }
  memoryStore[key] = value;
  return {key, value};
}

async function loadState(){
  try{
    const l = await safeGet('lessons-data');
    state.lessons = l ? JSON.parse(l.value) : SEED_LESSONS.slice();
  }catch(e){ state.lessons = SEED_LESSONS.slice(); }

  try{
    const p = await safeGet('progress');
    state.progress = p ? JSON.parse(p.value) : {completedIds:[], streak:0, lastCompletedDate:null};
  }catch(e){ state.progress = {completedIds:[], streak:0, lastCompletedDate:null}; }

  try{
    const v = await safeGet('vocab-bank');
    state.vocabBank = v ? JSON.parse(v.value) : {};
  }catch(e){ state.vocabBank = {}; }

  if(!state.lessons || !state.lessons.length){
    state.lessons = SEED_LESSONS.slice();
    await saveLessons();
  }
  // ensure lessons sorted by id
  state.lessons.sort((a,b)=>a.id-b.id);
}
async function saveLessons(){ await safeSet('lessons-data', JSON.stringify(state.lessons)); }
async function saveProgress(){ await safeSet('progress', JSON.stringify(state.progress)); }
async function saveVocab(){ await safeSet('vocab-bank', JSON.stringify(state.vocabBank)); }

// ---------------- VOCAB SPACED REPETITION ----------------
function addVocabFromLesson(lesson){
  const today = fmt(new Date());
  (lesson.vocabulary||[]).forEach(v=>{
    const key = lesson.id + '_' + v.word;
    if(!state.vocabBank[key]){
      state.vocabBank[key] = {
        word:v.word, arabic:v.arabic, synonym:v.synonym, lessonId:lesson.id,
        dateAdded: today,
        stage: 0, // 0=new,1=done7,2=done30,3=done90(mastered)
        nextReview: fmt(addDays(new Date(), 7))
      };
    }
  });
}
function getDueVocab(){
  const today = fmt(new Date());
  return Object.values(state.vocabBank).filter(v => v.stage < 3 && v.nextReview <= today);
}
async function markVocabReviewed(key){
  const v = state.vocabBank[key];
  if(!v) return;
  if(v.stage===0){ v.stage=1; v.nextReview = fmt(addDays(new Date(),30)); }
  else if(v.stage===1){ v.stage=2; v.nextReview = fmt(addDays(new Date(),90)); }
  else if(v.stage===2){ v.stage=3; }
  await saveVocab();
  render();
}

// ---------------- PROGRESS ----------------
async function markLessonComplete(lessonId){
  if(!state.progress.completedIds.includes(lessonId)){
    state.progress.completedIds.push(lessonId);
    const today = fmt(new Date());
    const last = state.progress.lastCompletedDate;
    if(last){
      const lastD = parseDate(last);
      let expected = addDays(lastD,1);
      while(isFriday(expected)) expected = addDays(expected,1);
      if(fmt(expected)===today) state.progress.streak += 1;
      else if(last !== today) state.progress.streak = 1;
    } else { state.progress.streak = 1; }
    state.progress.lastCompletedDate = today;
    const lesson = state.lessons.find(l=>l.id===lessonId);
    if(lesson) addVocabFromLesson(lesson);
    await saveProgress();
    await saveVocab();
    toast('أحسنت! تم إنهاء الدرس ✔');
    render();
  }
}

// ---------------- IMPORT ----------------
async function importLessons(){
  const raw = document.getElementById('importArea').value.trim();
  if(!raw){ toast('الرجاء لصق بيانات الدرس أولاً'); return; }
  try{
    const data = JSON.parse(raw);
    const arr = Array.isArray(data) ? data : [data];
    let addedCount=0, updatedCount=0;
    arr.forEach(newLesson=>{
      const idx = state.lessons.findIndex(l=>l.id===newLesson.id);
      if(idx>=0){ state.lessons[idx]=newLesson; updatedCount++; }
      else { state.lessons.push(newLesson); addedCount++; }
    });
    state.lessons.sort((a,b)=>a.id-b.id);
    await saveLessons();
    document.getElementById('importArea').value='';
    toast(`تم! أُضيف ${addedCount} وتحديث ${updatedCount}`);
    state.view='roadmap';
    render();
  }catch(e){
    toast('خطأ: تأكد أن النص JSON صحيح');
  }
}

// ---------------- RENDER ----------------
function currentLevelInfo(){
  const doneIds = state.progress.completedIds;
  const maxDone = doneIds.length ? Math.max(...doneIds) : 0;
  const lastLesson = state.lessons.find(l=>l.id===maxDone) || state.lessons[0];
  return lastLesson || {cefr:"A2", level:5};
}

function renderPath(){
  const levels = [5,6,7,8,9,10,11,12];
  const info = currentLevelInfo();
  return `<div class="path">${levels.map((lvl,i)=>{
    const done = lvl < info.level;
    const current = lvl === info.level;
    return `<div class="path-step">
      <div class="path-dot ${done?'done':''} ${current?'current':''}">${LEVEL_META[lvl].cefr[0]}${lvl}</div>
      <div class="path-label">${LEVEL_META[lvl].cefr}</div>
    </div>${i<levels.length-1?'<div class="path-line"></div>':''}`;
  }).join('')}</div>`;
}

function renderHome(){
  const idx = studyIndexForToday();
  const doneIds = state.progress.completedIds;
  let todayLesson = null;
  if(idx>0) todayLesson = state.lessons.find(l=>l.id===idx);
  const due = getDueVocab();

  let dayInfo = '';
  if(idx===-1) dayInfo = `<div class="muted">اليوم جمعة – يوم راحة 🌿 استرح واستعد للأسبوع القادم.</div>`;
  else if(idx===0) dayInfo = `<div class="muted">الرحلة تبدأ يوم السبت 11 يوليو 2026.</div>`;
  else dayInfo = `<div class="muted">اليوم الدراسي رقم ${idx} من 180</div>`;

  let lessonCard = '';
  if(todayLesson){
    const isDone = doneIds.includes(todayLesson.id);
    lessonCard = `
    <div class="card today-card">
      <span class="badge ${todayLesson.cefr==='B1'?'b1':todayLesson.cefr==='B2'?'b2':''}">${todayLesson.cefr} · Level ${todayLesson.level} · Lesson ${todayLesson.id}</span>
      <h3>${todayLesson.title}</h3>
      <div class="muted" style="margin-bottom:10px;">${isDone? 'أنهيت هذا الدرس ✅' : 'درس اليوم بانتظارك'}</div>
      <button class="btn" onclick="openLesson(${todayLesson.id})">${isDone?'مراجعة الدرس':'ابدأ درس اليوم'}</button>
    </div>`;
  } else if(idx>0){
    lessonCard = `<div class="card"><div class="empty-state">درس اليوم (رقم ${idx}) لم يُضَف بعد للتطبيق.<br>سيصلك ملف الدرس قريباً لتستورده من تبويب "إضافة دروس".</div></div>`;
  }

  let vocabCard = '';
  if(due.length){
    vocabCard = `<div class="card">
      <h3>🔁 كلمات للمراجعة اليوم (${due.length})</h3>
      ${due.map(v=>{
        const key = v.lessonId+'_'+v.word;
        return `<div class="vocab-review-item">
          <div class="vocab-word">${v.word}<span class="ar">${v.arabic} — ${v.synonym}</span></div>
          <button class="btn small" onclick="markVocabReviewed('${key}')">تذكرتها</button>
        </div>`;
      }).join('')}
    </div>`;
  }

  const totalWords = Object.keys(state.vocabBank).length;
  const mastered = Object.values(state.vocabBank).filter(v=>v.stage===3).length;

  return `
    <div class="section">
      ${lessonCard}
      ${dayInfo ? `<div class="card" style="text-align:center;">${dayInfo}</div>`:''}
      ${vocabCard}
      <div class="card">
        <h3>📊 إحصائياتك</h3>
        <div class="muted">دروس منجزة: ${doneIds.length} / 180</div>
        <div class="muted">كلمات في بنك المراجعة: ${totalWords} (أُتقن منها ${mastered})</div>
        <div class="muted">سلسلة الالتزام (Streak): ${state.progress.streak} يوم متتالٍ 🔥</div>
      </div>
    </div>
  `;
}

function renderRoadmap(){
  const doneIds = state.progress.completedIds;
  const loadedIds = state.lessons.map(l=>l.id);
  let rows = '';
  for(let i=1;i<=180;i++){
    const lesson = state.lessons.find(l=>l.id===i);
    const date = dateForLessonIndex(i);
    if(lesson){
      const isDone = doneIds.includes(i);
      rows += `<div class="lesson-row ${isDone?'done':''}" onclick="openLesson(${i})">
        <div class="lesson-num">${i}</div>
        <div class="lesson-info">
          <div class="lesson-tag">${lesson.cefr} · Level ${lesson.level}</div>
          <div class="lesson-title">${lesson.title}</div>
          <div class="lesson-date">${fmtArDate(date)}</div>
        </div>
        <div>${isDone?'✅':'▶'}</div>
      </div>`;
    } else if(i <= Math.max(...loadedIds, 0) + 3 || i <= 24) {
      // show a few upcoming locked placeholders near loaded content
      const lvl = ROADMAP_OVERVIEW.find(r=>{
        const [a,b] = r.range.match(/\d+/g).map(Number);
        return i>=a && i<=b;
      });
      rows += `<div class="lesson-row locked">
        <div class="lesson-num">${i}</div>
        <div class="lesson-info">
          <div class="lesson-tag">${lvl?lvl.cefr:''} · Level ${lvl?lvl.level:''}</div>
          <div class="lesson-title">قريباً — سيصلك ملف هذا الدرس لتستورده</div>
          <div class="lesson-date">${fmtArDate(date)}</div>
        </div>
      </div>`;
    }
  }

  return `<div class="section">
    <div class="card">
      <h3>🗺️ خارطة الطريق الكاملة (A2 → B2)</h3>
      <table class="roadmap-table">
        <tr><th>المرحلة</th><th>المستوى</th><th>الدروس</th><th>الفترة التقريبية</th></tr>
        ${ROADMAP_OVERVIEW.map(r=>`<tr><td>${r.cefr}</td><td>Level ${r.level}</td><td>${r.range}</td><td>${r.period}</td></tr>`).join('')}
      </table>
      <div class="muted" style="margin-top:8px;">* الفترات تقريبية وقابلة للتعديل حسب مسار تقدمك الفعلي.</div>
    </div>
    <div class="card"><h3>📅 الدروس (المُحمّلة أولاً)</h3></div>
    ${rows}
  </div>`;
}

function renderLesson(){
  const lesson = state.lessons.find(l=>l.id===state.activeLessonId);
  if(!lesson) return `<div class="section"><div class="empty-state">الدرس غير موجود</div></div>`;
  const isDone = state.progress.completedIds.includes(lesson.id);

  return `<div class="section">
    <button class="back-btn" onclick="state.view='roadmap'; render();">→ رجوع لخارطة الطريق</button>

    <div class="quote-card">
      <div class="q-text">${lesson.quote.text}</div>
      <div class="q-src">${lesson.quote.source}</div>
    </div>

    <div class="card">
      <span class="badge ${lesson.cefr==='B1'?'b1':lesson.cefr==='B2'?'b2':''}">${lesson.cefr} · Level ${lesson.level} · Lesson ${lesson.id}</span>
      <h2 style="margin:6px 0 0;">${lesson.title}</h2>
    </div>

    <div class="card lesson-detail-section">
      <h3><span class="icon-circle">🎧</span> أولاً: الاستماع</h3>
      <div class="muted" style="margin-bottom:8px;">المصدر: ${lesson.listening.source}</div>
      <a class="link-btn" href="${lesson.listening.url}" target="_blank" rel="noopener">فتح رابط الاستماع ↗</a>
      <div style="font-size:13.5px;">${lesson.listening.instructions}</div>
    </div>

    <div class="card lesson-detail-section">
      <h3><span class="icon-circle">📖</span> ثانياً: القراءة</h3>
      <div class="eng-text">${lesson.reading.text}</div>
      <div class="muted" style="margin:10px 0 6px;">أسئلة الفهم:</div>
      <ol class="qa-list">${lesson.reading.questions.map(q=>`<li>${q}</li>`).join('')}</ol>
    </div>

    <div class="card lesson-detail-section">
      <h3><span class="icon-circle">🔤</span> ثالثاً: الكلمات</h3>
      <div class="vocab-grid">
        ${lesson.vocabulary.map(v=>`<div class="vocab-item">
          <div class="en">${v.word}</div>
          <div class="meta">${v.arabic}<br>مرادف أقوى: <b>${v.synonym}</b></div>
        </div>`).join('')}
      </div>
    </div>

    <div class="card lesson-detail-section">
      <h3><span class="icon-circle">📘</span> رابعاً: القواعد</h3>
      <div style="font-weight:800; margin-bottom:6px;">${lesson.grammar.title}</div>
      <div style="font-size:13.5px; line-height:1.9;">${lesson.grammar.explanation}</div>
      <div class="muted" style="margin:8px 0 4px;">أمثلة:</div>
      ${lesson.grammar.examples.map(e=>`<div class="grammar-ex">${e}</div>`).join('')}
      <div class="muted" style="margin:10px 0 4px;">تمارين تطبيقية (املأ الفراغ):</div>
      ${lesson.grammar.practice.map((p,i)=>`<div class="practice-item">${i+1}. ${p}</div>`).join('')}
    </div>

    <div class="card lesson-detail-section">
      <h3><span class="icon-circle">✍️</span> خامساً: الكتابة</h3>
      <div class="prompt-box">${lesson.writing.prompt}</div>
      <div class="meta-row"><span class="meta-chip">${lesson.writing.wordCount}</span></div>
    </div>

    <div class="card lesson-detail-section">
      <h3><span class="icon-circle">🗣️</span> سادساً: التحدث (Speaking)</h3>
      <div class="prompt-box">${lesson.speaking.prompt}</div>
      <div class="meta-row"><span class="meta-chip">${lesson.speaking.duration}</span><span class="meta-chip">${lesson.speaking.mode}</span></div>
    </div>

    <button class="btn ${isDone?'secondary':''}" ${isDone?'disabled':''} onclick="markLessonComplete(${lesson.id})">
      ${isDone? 'تم إنهاء هذا الدرس ✅' : 'أنهيت الدرس – إضافة الكلمات لبنك المراجعة'}
    </button>
  </div>`;
}

function renderImport(){
  return `<div class="section">
    <div class="card">
      <h3>➕ إضافة دروس جديدة</h3>
      <div class="muted" style="margin-bottom:10px;">الصق هنا محتوى ملف الدرس (JSON) الذي أرسله لك كلود، ثم اضغط استيراد. يمكن لصق درس واحد أو مجموعة دروس (Array) دفعة واحدة.</div>
      <textarea id="importArea" placeholder="الصق JSON هنا..."></textarea>
      <div style="height:10px;"></div>
      <button class="btn" onclick="importLessons()">استيراد الدروس</button>
    </div>
    <div class="card">
      <h3>📋 شكل البيانات المتوقع (Schema)</h3>
      <div class="schema-box">{
  "id": 7,
  "cefr": "A2",
  "level": 6,
  "title": "...",
  "quote": {"text": "...", "source": "..."},
  "listening": {"source": "...", "url": "...", "instructions": "..."},
  "reading": {"text": "...", "questions": ["...", "..."]},
  "vocabulary": [{"word":"...","arabic":"...","synonym":"..."}],
  "grammar": {"title":"...","explanation":"...","examples":["..."],"practice":["..."]},
  "writing": {"prompt":"...","wordCount":"..."},
  "speaking": {"prompt":"...","duration":"...","mode":"..."}
}</div>
    </div>
  </div>`;
}

function render(){
  const root = document.getElementById('root');
  const info = currentLevelInfo();
  root.innerHTML = `
    <div class="app">
      <header class="hero">
        <div class="hero-top">
          <div>
            <p class="hero-title">رحلتي إلى B2 🌱</p>
            <p class="hero-sub">من A2 إلى B2 · 11 يوليو 2026 → 5 فبراير 2027</p>
          </div>
          <div class="streak-pill">🔥 ${state.progress.streak}</div>
        </div>
        ${renderPath()}
      </header>
      ${(!usingRealStorage && !usingLocalStorage) ? `<div style="background:#FBEBD1;color:#8A5A16;font-size:12.5px;text-align:center;padding:8px 14px;">⚠️ الحفظ الدائم غير متاح في وضع التصفح الحالي (قد يكون التصفح الخاص/المتخفي). افتح الملف في تبويب عادي.</div>` : ''}
      <div class="tabs">
        <div class="tab ${state.view==='home'?'active':''}" onclick="state.view='home'; render();">الرئيسية</div>
        <div class="tab ${state.view==='roadmap'?'active':''}" onclick="state.view='roadmap'; render();">خارطة الطريق</div>
        <div class="tab ${state.view==='import'?'active':''}" onclick="state.view='import'; render();">إضافة دروس</div>
      </div>
      ${state.view==='home' ? renderHome() : state.view==='roadmap' ? renderRoadmap() : state.view==='import' ? renderImport() : renderLesson()}
    </div>
    <div class="toast" id="toast"></div>
  `;
}

function openLesson(id){
  state.activeLessonId = id;
  state.view = 'lesson';
  render();
}

// ---------------- SERVICE WORKER (enables standalone install) ----------------
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('ej-sw.js').catch(()=>{ /* ignore if unavailable, e.g. local files */ });
  });
}

// ---------------- INIT ----------------
window.addEventListener('error', function(e){
  const root = document.getElementById('root');
  if(root && !root.dataset.rendered){
    root.innerHTML = '<div style="padding:24px;font-family:sans-serif;direction:rtl;text-align:right;color:#1F2A24;">'
      + '<h2>حصل خطأ أثناء تحميل التطبيق</h2>'
      + '<p style="font-size:13px;color:#5B6B63;">'+ (e.message||'خطأ غير معروف') +'</p>'
      + '<p style="font-size:13px;">جرّب إعادة فتح الملف من داخل المحادثة مباشرة (وليس بعد تنزيله)، أو افتحه في متصفح Chrome/Safari.</p>'
      + '</div>';
  }
});

(async function init(){
  try{
    await loadState();
    render();
    document.getElementById('root').dataset.rendered = '1';
  }catch(err){
    document.getElementById('root').innerHTML = '<div style="padding:24px;font-family:sans-serif;direction:rtl;text-align:right;">'
      + '<h2>تعذّر تحميل بياناتك المحفوظة</h2>'
      + '<p style="font-size:13px;color:#5B6B63;">'+ (err.message||err) +'</p>'
      + '<button onclick="localFallbackInit()" style="margin-top:10px;padding:10px 16px;border-radius:10px;border:none;background:#0E6B5C;color:#fff;font-weight:700;">إعادة المحاولة بدون حفظ سابق</button>'
      + '</div>';
  }
})();

async function localFallbackInit(){
  state.lessons = SEED_LESSONS.slice();
  state.progress = {completedIds:[], streak:0, lastCompletedDate:null};
  state.vocabBank = {};
  render();
  document.getElementById('root').dataset.rendered = '1';
}
</script>
</body>
</html>
